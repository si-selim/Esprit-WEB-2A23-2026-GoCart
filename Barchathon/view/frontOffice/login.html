<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Se connecter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="page-narrow">
        <div class="card-form fade-in">
            <h1>Se connecter</h1>
            <p>Connectez-vous pour acceder a votre espace personnel.</p>
            <div id="error-box" class="error-msg" style="display:none;"></div>
            <form method="POST" action="../../controller/login.php">
                <div class="field-mb">
                    <label for="username">Nom d utilisateur</label>
                    <input id="username" name="username" type="text" placeholder="Nom d utilisateur" required>
                </div>
                <div class="field-mb">
                    <label for="password">Mot de passe</label>
                    <input id="password" name="password" type="password" placeholder="Mot de passe" required>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" type="submit">Connexion</button>
                    <a class="btn btn-secondary" href="register.html">S inscrire</a>
                </div>
            </form>
        </div>
    </div>

    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="feedback-icon" class="feedback-icon success"></div>
            <p id="feedback-message"></p>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
</body>
</html>
